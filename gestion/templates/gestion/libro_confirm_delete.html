{% extends 'gestion/base.html' %}

{% block title %}Eliminar libro{% endblock %}

{% block content %}
<div class="confirm-panel">
    <h2>Eliminar libro</h2>
    <p>Desea eliminar <strong>{{ libro.titulo }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button class="danger" type="submit">Si, eliminar</button>
            <a class="button secondary" href="{% url 'lista_libros' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
