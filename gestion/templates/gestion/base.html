<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gestion de libros{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --panel: #ffffff;
            --text: #18202a;
            --muted: #667085;
            --line: #d9dee7;
            --head: #253044;
            --primary: #1d4ed8;
            --danger: #b42318;
            --success: #087443;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }

        header {
            background: var(--head);
            color: white;
            padding: 20px 32px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        nav a,
        .button,
        button {
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            font: inherit;
            font-weight: 700;
            padding: 9px 13px;
            text-decoration: none;
        }

        nav a {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        main {
            margin: 32px auto;
            max-width: 1120px;
            padding: 0 20px;
        }

        .page-head {
            align-items: center;
            display: flex;
            gap: 16px;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
        }

        .button,
        button {
            background: var(--primary);
            color: white;
        }

        .button.secondary {
            background: #536172;
        }

        .button.danger,
        button.danger {
            background: var(--danger);
        }

        .button.success {
            background: var(--success);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            background: var(--panel);
            border: 1px solid var(--line);
            border-collapse: collapse;
            min-width: 760px;
            width: 100%;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #e9edf3;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .empty,
        .form-panel,
        .confirm-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 20px;
        }

        .form-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input,
        select,
        textarea {
            border: 1px solid #c7cfda;
            border-radius: 6px;
            font: inherit;
            padding: 10px;
            width: 100%;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .errorlist {
            color: var(--danger);
            margin: 6px 0 0;
            padding-left: 18px;
        }

        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            header {
                padding: 18px 20px;
            }

            .page-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Administracion de libros</h1>
        <nav>
            <a href="{% url 'lista_autores' %}">Autores</a>
            <a href="{% url 'lista_libros' %}">Libros</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
